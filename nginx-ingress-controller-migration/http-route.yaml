apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: flexiserver-route
  namespace: default
spec:
  parentRefs:
    - name: aks-migration-gateway # Links to the Gateway above
  hostnames:
    - "staging.go.app.local" # Replace with your actual host
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: go-app-service # Your existing Go App Service
          port: 8080
