version: 2.1

jobs:
  build-and-push:
    docker:
      - image: cimg/go:1.21
    working_directory: ~/project
    steps:
      - checkout
      - setup_remote_docker:
          version: 20.10.24
      - run:
          name: Build and Push Docker Image
          command: |
            cd go-sa-postgres
            # Create a unique tag using the CircleCI build number
            TAG="0.1.${CIRCLE_BUILD_NUM}"
            IMAGE_NAME="anuroop21/go-sa-postgres"
            
            docker build -t $IMAGE_NAME:$TAG .
            echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USER" --password-stdin
            docker push $IMAGE_NAME:$TAG
            
            # Save the tag for the next step
            echo "export NEW_TAG=$TAG" >> $BASH_ENV

      - run:
          name: Update Kubernetes Manifests (GitOps)
          command: |
            cd go-sa-postgres
            pwd
            ls -ltr
            source $BASH_ENV
            git config --global user.email "circleci@example.com"
            git config --global user.name "CircleCI-Bot"
            
            # Use sed to update the image line in your deployment.yaml
            # This looks for 'image: anuroop21/go-db-application:' and replaces the tag
            sed -i "s|image: anuroop21/go-sa-postgres:.*|image: anuroop21/go-sa-postgres:$NEW_TAG|g" deployment.yaml
            
            git add deployment.yaml
            git commit -m "chore: update image tag to $NEW_TAG [skip ci]"
            git push origin feature/fullstack-integration

workflows:
  deploy-flow:
    jobs:
      - build-and-push:
          filters:
            branches:
              only: feature/fullstack-integration