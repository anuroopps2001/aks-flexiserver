apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: secure-app
  namespace: default
spec:
  parentRefs:
  - name: nginx
  hostnames:
  - "app1.local"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: demo-svc
      port: 80
