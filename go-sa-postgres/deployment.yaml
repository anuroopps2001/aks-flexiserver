apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-app
  template:
    metadata:
      labels:
        app: go-app
    spec:
      containers:
      - name: go-app
        image: anuroop21/go-sa-postgres:0.1.89
        ports:
        - containerPort: 8080
        env:
        - name: DB_HOST
          value: "first-server2873.postgres.database.azure.com"
        - name: DB_NAME
          value: "postgres"
        - name: DB_USER
          value: "psqladmin"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: db-password
        - name: STORAGE_ACCOUNT_NAME
          value: "appstore1773637478"
        - name: STORAGE_ACCOUNT_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: storage-key
---
apiVersion: v1
kind: Service
metadata:
  name: go-app-service
spec:
  type: ClusterIP
  selector:
    app: go-app
  ports:
  - port: 80
    targetPort: 8080
