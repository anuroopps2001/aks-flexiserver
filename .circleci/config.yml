version: 2.1

executors:
  go-executor:
    docker:
      - image: cimg/go:1.23

jobs:
  build:
    executor: go-executor
    working_directory: ~/project
    steps:
      - checkout
      - run:
          name: Install dependencies
          working_directory: go-with-best-practices/src
          command: |
            ls -ltr
            pwd
            go mod tidy

      - run:
          name: Check formatting
          working_directory: go-with-best-practices/src
          command: |
            test -z "$(gofmt -l .)"

      - run:
          name: Run go vet
          working_directory: go-with-best-practices/src
          command: go vet ./...

      - run:
          name: Scan go vulnarabilities
          working_directory: go-with-best-practices/src
          command: |
            go install golang.org/x/vuln/cmd/govulncheck@latest
            govulncheck ./... || true

      - run:
          name: Build application
          working_directory: go-with-best-practices/src
          command: go build -o app

  docker-build-and-push:
    docker:
      - image: cimg/base:stable
    working_directory: ~/project
    steps:
      - checkout
      
      - setup_remote_docker

      - run:
          name: Lint Dockerfile
          working_directory: go-with-best-practices/
          command: docker run --rm -i hadolint/hadolint hadolint --ignore DL3018 - < Dockerfile

      - run:
          name: Build the Docker image
          working_directory: go-with-best-practices/
          command: |
            TAG="${CIRCLE_BUILD_NUM}"
            docker build -t $DOCKERHUB_USER/go-app:${CIRCLE_SHA1} .

      - run:
          name: Install Trivy
          command: |
            curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh

      - run:
          name: Scan Docker image
          command: |
            ./bin/trivy image --severity HIGH,CRITICAL --ignore-unfixed $DOCKERHUB_USER/go-app:${CIRCLE_SHA1}

      - run:
          name: Login to DockerHub
          command: |
            echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USER" --password-stdin

      - run:
          name: Push docker image
          command: |
            docker push $DOCKERHUB_USER/go-app:${CIRCLE_SHA1}
            docker tag $DOCKERHUB_USER/go-app:${CIRCLE_SHA1} $DOCKERHUB_USER/go-app:latest
            docker push $DOCKERHUB_USER/go-app:latest
  
  update_gitops_dev:
    docker:
      - image: cimg/base:stable
    steps:
      - add_ssh_keys:
          fingerprints:
            - "SHA256:3VMsYjR8Hf6fJiov9u9gfdlXB+PpAy8yV9XC0EVaDvE"
      - run:
          name: Add GitHub to known_hosts
          command: |
            mkdir -p ~/.ssh
            ssh-keyscan github.com >> ~/.ssh/known_hosts

      - run:
          name: Clone gitops repo (Dev Branch)
          command: |
            git clone -b dev git@github.com:anuroopps2001/gitops-repo.git
            cd gitops-repo

      - run:
          name: Update the tag
          command: |
            cd gitops-repo/overlays/dev
            sed -i "s/newTag: .*/newTag: ${CIRCLE_SHA1}/g" kustomization.yaml

      - run:
          name: Commit the changes
          command: |
            cd gitops-repo
            git config user.email "ci@circleci.com"
            git config user.name "circleCI"
            git add .
            git commit -m "dev: Updated image tag ${CIRCLE_SHA1} [skip ci]" || echo "No changes"
            git push origin dev

  smoke_test_dev:
    docker:
      - image: cimg/base:stable
    steps:
      - run:
          name: Wait for deployment
          command: |
            echo "Waiting for Argocd deployment"
            sleep 40

      - run: 
          name: Smoke test (Dev)
          command: |
            echo "Running smoke tests..!!"
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://go.app)
            if [ "$RESPONSE" -ne 200]; then
              echo "Application is not responsive"
              exit 1
            fi

  creating_pr_staging:
    docker:
      - image: cimg/base:stable
    steps:
      - run:
          name: Clone GitOps Repo
          command: |
            git clone https://github.com/anuroopps2001/gitops-repo.git
            cd gitops-repo

      - run:
          name: Create a Promotion branch from staging
          command: |
            cd gitops-repo

            echo "Repo Structure"
            ls -R

            BRANCH="promote-${CIRCLE_SHA1}"
            
            # create a promote branch which should be a copy of staging branch at that stage (Basically a copy of staging branch)
            git checkout -b $BRANCH origin/staging

            git config user.email "ci@circle.com"
            git config user.name "circleci"
            
            cd overlays/staging
            sed -i "s/newTag: .*/newTag: ${CIRCLE_SHA1}/g" kustomization.yaml

            cd ../..

            git add .
            git commit -m "promote ${CIRCLE_SHA1} to staging"

            git remote set-url origin https://${GITHUB_TOKEN}@github.com/anuroopps2001/gitops-repo.git
            git push origin $BRANCH

      - run:
          name: Create PR (dev -> staging)
          command: |
            curl -X POST https://api.github.com/repos/anuroopps2001/gitops-repo/pulls \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d "{
              \"title\": \"Promote ${CIRCLE_SHA1} to staging\",
              \"head\": \"${BRANCH}\",
              \"base\": \"staging\",
              \"body\": \"Auto PR after successful dev deployment and smoke test.\"
            }"

workflows:
  version: 2
  build_and_push:
    jobs:
      - build
      - docker-build-and-push:
          requires:
            - build
      - update_gitops_dev:
          requires:
            - docker-build-and-push
      - smoke_test_dev:
          requires:
            - update_gitops_dev
      - creating_pr_staging:
          requires:
            - smoke_test_dev

