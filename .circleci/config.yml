version: 2.1

executors:
  go-executor:
    docker:
      - image: cimg/go:1.23

jobs:
  build:
    executor: go-executor
    working_directory: ~/project
    steps:
      - checkout
      - run:
          name: Install dependencies
          working_directory: go-with-best-practices/src
          command: |
            ls -ltr
            pwd
            go mod tidy

      - run:
          name: Check formatting
          working_directory: go-with-best-practices/src
          command: |
            test -z "$(gofmt -l .)"

      - run:
          name: Run go vet
          working_directory: go-with-best-practices/src
          command: go vet ./...

      - run:
          name: Scan go vulnarabilities
          working_directory: go-with-best-practices/src
          command: |
            go install golang.org/x/vuln/cmd/govulncheck@latest
            govulncheck ./... || true

      - run:
          name: Build application
          working_directory: go-with-best-practices/src
          command: go build -o app

  docker-build-and-push:
    docker:
      - image: cimg/base:stable
    working_directory: ~/project
    steps:
      - checkout
      
      - setup_remote_docker

      - run:
          name: Lint Dockerfile
          working_directory: go-with-best-practices/
          command: docker run --rm -i hadolint/hadolint --ignore DL3018 < Dockerfile

      - run:
          name: Build the Docker image
          working_directory: go-with-best-practices/
          command: |
            TAG="${CIRCLE_BUILD_NUM}"
            IMAGE_NAME="anuroop21/go-best-practice"
            docker build -t $DOCKERHUB_USER/go-app:${CIRCLE_SHA1} .

      - run:
          name: Install Trivy
          command: |
            curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh

      - run:
          name: Scan Docker image
          command: |
            ./bin/trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed $DOCKERHUB_USER/go-app:${CIRCLE_SHA1}

      - run:
          name: Login to DockerHub
          command: |
            echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USER" --password-stdin

      - run:
          name: Push docker image
          command: |
            docker push $DOCKERHUB_USER/go-app:${CIRCLE_SHA1}
            docker tag $DOCKERHUB_USER/go-app:${CIRCLE_SHA1} $DOCKERHUB_USER/go-app:latest
            docker push $DOCKERHUB_USER/go-app:latest

workflows:
  version: 2
  build_and_push:
    jobs:
      - build
      - docker-build-and-push:
          requires:
            - build
          filters:
            branches:
              only:
                - feature/go-best-practices

            
